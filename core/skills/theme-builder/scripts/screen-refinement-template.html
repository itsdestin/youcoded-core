<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Theme Refinement</title>
  <link rel="stylesheet" href="/files/theme-preview.css">
  <style>
    /* Refinement page — sits outside theme-preview.css scope.
       Uses its own neutral palette so the user evaluates assets
       against a clean backdrop, not a themed one. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ref-bg: #1a1a1a;
      --ref-surface: #242424;
      --ref-surface-2: #2e2e2e;
      --ref-border: #3a3a3a;
      --ref-text: #e0e0e0;
      --ref-text-dim: #888888;
      --ref-accent: #6c8aff;
      --ref-accent-hover: #8aa2ff;
      --ref-green: #4ade80;
      --ref-green-bg: rgba(74, 222, 128, 0.12);
      --ref-green-border: rgba(74, 222, 128, 0.3);
      --ref-amber: #fbbf24;
      --ref-amber-bg: rgba(251, 191, 36, 0.12);
      --ref-amber-border: rgba(251, 191, 36, 0.3);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ref-bg);
      color: var(--ref-text);
      line-height: 1.5;
      padding-bottom: 120px; /* space for sticky submit bar */
    }

    /* ── Page header ── */
    .ref-header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid var(--ref-border);
    }
    .ref-header h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .ref-header p {
      font-size: 13px;
      color: var(--ref-text-dim);
    }

    /* ── Sections ── */
    .ref-section {
      margin: 24px 32px;
      border: 1px solid var(--ref-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--ref-surface);
    }
    .ref-section[data-hidden="true"] { display: none; }

    .ref-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--ref-surface-2);
      border-bottom: 1px solid var(--ref-border);
      cursor: pointer;
      user-select: none;
    }
    .ref-section-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ref-section-header .chevron {
      font-size: 12px;
      color: var(--ref-text-dim);
      transition: transform 0.2s;
    }
    .ref-section.collapsed .chevron { transform: rotate(-90deg); }
    .ref-section.collapsed .ref-section-body { display: none; }

    .ref-section-body { padding: 20px; }

    /* ── Toggle buttons (approve / request changes) ── */
    .ref-toggle-row {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--ref-border);
      background: var(--ref-surface-2);
    }
    .ref-toggle-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid var(--ref-border);
      background: transparent;
      color: var(--ref-text-dim);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ref-toggle-btn:hover { border-color: var(--ref-text-dim); }

    .ref-toggle-btn.active-approve {
      background: var(--ref-green-bg);
      border-color: var(--ref-green-border);
      color: var(--ref-green);
    }
    .ref-toggle-btn.active-change {
      background: var(--ref-amber-bg);
      border-color: var(--ref-amber-border);
      color: var(--ref-amber);
    }

    /* ── Change notes textarea ── */
    .ref-notes-area {
      padding: 0 20px 16px;
      display: none;
      background: var(--ref-surface-2);
    }
    .ref-notes-area.visible { display: block; }
    .ref-notes-area textarea {
      width: 100%;
      min-height: 60px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--ref-border);
      background: var(--ref-bg);
      color: var(--ref-text);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    .ref-notes-area textarea::placeholder { color: var(--ref-text-dim); }
    .ref-notes-area textarea:focus {
      outline: none;
      border-color: var(--ref-accent);
    }

    /* ── Content layout helpers ── */
    .ref-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .ref-col { display: flex; flex-direction: column; gap: 8px; }

    .ref-wallpaper-preview {
      width: 100%;
      max-height: 300px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--ref-border);
    }
    .ref-wallpaper-gradient {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      border: 1px solid var(--ref-border);
    }

    .ref-glass-sample {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 13px;
      min-width: 200px;
    }

    .ref-pattern-tile {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      border: 1px solid var(--ref-border);
      background-repeat: repeat;
    }

    .ref-particle-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }

    .ref-mascot-grid {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .ref-mascot-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .ref-mascot-item img, .ref-mascot-item svg {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      border: 2px solid var(--ref-border);
      padding: 8px;
      background: var(--ref-surface-2);
    }
    .ref-mascot-label {
      font-size: 12px;
      color: var(--ref-text-dim);
      font-weight: 500;
    }

    .ref-icon-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .ref-icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .ref-icon-item img, .ref-icon-item svg {
      width: 48px;
      height: 48px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--ref-border);
      background: var(--ref-surface-2);
    }
    .ref-icon-item .ref-icon-large img,
    .ref-icon-item .ref-icon-large svg {
      width: 64px;
      height: 64px;
    }
    .ref-icon-label {
      font-size: 11px;
      color: var(--ref-text-dim);
    }

    .ref-selection-sample {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--ref-border);
      background: var(--ref-surface-2);
      font-size: 13px;
      line-height: 1.6;
    }

    .ref-scrollbar-strip {
      width: 8px;
      height: 80px;
      border-radius: 4px;
      border: 1px solid var(--ref-border);
    }

    .ref-label {
      font-size: 11px;
      color: var(--ref-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    /* ── Sticky submit bar ── */
    .ref-submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 32px;
      background: var(--ref-surface);
      border-top: 1px solid var(--ref-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    .ref-submit-status {
      font-size: 13px;
      color: var(--ref-text-dim);
    }
    .ref-submit-btn {
      padding: 12px 32px;
      border-radius: 10px;
      border: none;
      background: var(--ref-accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ref-submit-btn:hover { background: var(--ref-accent-hover); }
    .ref-submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="ref-header">
    <h1><!-- THEME_NAME --></h1>
    <p>Review each section below. Approve or request changes, then hit Build.</p>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       SECTION 1: Background & Atmosphere
       Claude fills the ref-section-body with wallpaper preview, pattern
       tile, glass sample, particle badge. Hide with data-hidden="true"
       if the theme has no background assets to review.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ref-section" data-section="background" id="section-background">
    <div class="ref-section-header" onclick="toggleSection(this)">
      <h2><span class="chevron">▼</span> Background &amp; Atmosphere</h2>
      <span class="ref-section-status" data-status-for="background"></span>
    </div>
    <div class="ref-section-body">
      <!-- BACKGROUND_CONTENT -->
    </div>
    <div class="ref-toggle-row">
      <button class="ref-toggle-btn active-approve" data-action="approve" data-for="background" onclick="setApproval(this)">✓ Looks good</button>
      <button class="ref-toggle-btn" data-action="change" data-for="background" onclick="setApproval(this)">✎ Request changes</button>
    </div>
    <div class="ref-notes-area" data-notes-for="background">
      <textarea placeholder="Describe what you'd like changed..." data-input-for="background"></textarea>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       SECTION 2: Mascot Crossovers
       Claude fills with 3 mascot SVGs at 120x120. Hide entirely
       if the theme has no mascot crossovers.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ref-section" data-section="mascot" id="section-mascot">
    <div class="ref-section-header" onclick="toggleSection(this)">
      <h2><span class="chevron">▼</span> Mascot Crossovers</h2>
      <span class="ref-section-status" data-status-for="mascot"></span>
    </div>
    <div class="ref-section-body">
      <!-- MASCOT_CONTENT -->
    </div>
    <div class="ref-toggle-row">
      <button class="ref-toggle-btn active-approve" data-action="approve" data-for="mascot" onclick="setApproval(this)">✓ Looks good</button>
      <button class="ref-toggle-btn" data-action="change" data-for="mascot" onclick="setApproval(this)">✎ Request changes</button>
    </div>
    <div class="ref-notes-area" data-notes-for="mascot">
      <textarea placeholder="Describe what you'd like changed..." data-input-for="mascot"></textarea>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       SECTION 3: Icons & Details
       Claude fills with icon grid, cursor, scrollbar, ::selection.
       Hide entirely if no icons/cursor/scrollbar in this theme.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ref-section" data-section="icons" id="section-icons">
    <div class="ref-section-header" onclick="toggleSection(this)">
      <h2><span class="chevron">▼</span> Icons &amp; Details</h2>
      <span class="ref-section-status" data-status-for="icons"></span>
    </div>
    <div class="ref-section-body">
      <!-- ICONS_CONTENT -->
    </div>
    <div class="ref-toggle-row">
      <button class="ref-toggle-btn active-approve" data-action="approve" data-for="icons" onclick="setApproval(this)">✓ Looks good</button>
      <button class="ref-toggle-btn" data-action="change" data-for="icons" onclick="setApproval(this)">✎ Request changes</button>
    </div>
    <div class="ref-notes-area" data-notes-for="icons">
      <textarea placeholder="Describe what you'd like changed..." data-input-for="icons"></textarea>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       Sticky submit bar
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ref-submit-bar">
    <span class="ref-submit-status" id="submit-status">All sections approved</span>
    <button class="ref-submit-btn" id="submit-btn" onclick="submitRefinement()">▶ Build Theme Pack</button>
  </div>

  <script src="/files/helper.js"></script>
  <script>
    // ── Section state ──
    // Each visible section defaults to "approved". Changing to "change"
    // reveals the notes textarea. Submit collects all states.
    const sectionState = {};

    // Initialize state for visible sections only
    document.querySelectorAll('.ref-section:not([data-hidden="true"])').forEach(el => {
      const key = el.dataset.section;
      sectionState[key] = { approved: true, notes: '' };
    });

    function toggleSection(headerEl) {
      headerEl.closest('.ref-section').classList.toggle('collapsed');
    }

    function setApproval(btn) {
      const section = btn.dataset.for;
      const action = btn.dataset.action;
      const row = btn.closest('.ref-toggle-row');
      const notesArea = document.querySelector(`[data-notes-for="${section}"]`);

      // Clear active states in this row
      row.querySelectorAll('.ref-toggle-btn').forEach(b => {
        b.classList.remove('active-approve', 'active-change');
      });

      if (action === 'approve') {
        btn.classList.add('active-approve');
        sectionState[section].approved = true;
        notesArea.classList.remove('visible');
      } else {
        btn.classList.add('active-change');
        sectionState[section].approved = false;
        notesArea.classList.add('visible');
        notesArea.querySelector('textarea').focus();
      }

      updateStatusIndicators();
      updateSubmitBar();
    }

    function updateStatusIndicators() {
      for (const [key, state] of Object.entries(sectionState)) {
        const indicator = document.querySelector(`[data-status-for="${key}"]`);
        if (!indicator) continue;
        if (state.approved) {
          indicator.textContent = '✓';
          indicator.style.color = 'var(--ref-green)';
        } else {
          indicator.textContent = '✎';
          indicator.style.color = 'var(--ref-amber)';
        }
      }
    }

    function updateSubmitBar() {
      const statusEl = document.getElementById('submit-status');
      const btnEl = document.getElementById('submit-btn');
      const sections = Object.entries(sectionState);
      const changeCount = sections.filter(([_, s]) => !s.approved).length;

      if (changeCount === 0) {
        statusEl.textContent = 'All sections approved';
        btnEl.textContent = '▶ Build Theme Pack';
      } else {
        statusEl.textContent = `${changeCount} section${changeCount > 1 ? 's' : ''} with changes`;
        btnEl.textContent = '▶ Submit Feedback';
      }
    }

    function submitRefinement() {
      // Collect notes from textareas
      for (const key of Object.keys(sectionState)) {
        const textarea = document.querySelector(`[data-input-for="${key}"]`);
        if (textarea) {
          sectionState[key].notes = textarea.value.trim();
        }
      }

      // Send structured event via brainstorm WebSocket API
      // (defined in helper.js)
      if (window.brainstorm) {
        window.brainstorm.send({
          type: 'refinement-submit',
          sections: { ...sectionState },
        });
      }

      // Visual feedback — disable button, show confirmation
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '✓ Sent — return to terminal';

      const statusEl = document.getElementById('submit-status');
      const changeCount = Object.values(sectionState).filter(s => !s.approved).length;
      if (changeCount === 0) {
        statusEl.textContent = 'Building theme pack...';
      } else {
        statusEl.textContent = 'Feedback sent — Claude is working on changes...';
      }
    }

    // Initialize
    updateStatusIndicators();
    updateSubmitBar();
  </script>
</body>
</html>
