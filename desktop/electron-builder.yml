appId: com.destinclaude.desktop
productName: DestinCode
directories:
  output: release
  buildResources: build
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.developer-tools
linux:
  target: AppImage
  category: Development
npmRebuild: false
asarUnpack:
  - dist/main/pty-worker.js
  - scripts/**/*
  - hook-scripts/**/*
files:
  - dist/**/*
  - node_modules/**/*
  - scripts/**/*
  - hook-scripts/**/*
  - assets/**/*
  - package.json
