name: Build DestinCode

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: desktop/release/*.exe
            name: windows
          - os: macos-latest
            artifact: desktop/release/*.dmg
            name: macos
          - os: ubuntu-latest
            artifact: desktop/release/*.AppImage
            name: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: destincode-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  upload:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Upload installers to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The release is already created by the release skill or release.yml.
          # Just attach the built binaries to it.
          for f in artifacts/**/*; do
            [ -f "$f" ] && gh release upload "$GITHUB_REF_NAME" "$f" --repo "$GITHUB_REPOSITORY" --clobber || true
          done
