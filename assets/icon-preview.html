<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111111; color: #E0E0E0; font-family: 'Cascadia Mono', monospace; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .option svg { border: 1px solid #333; border-radius: 8px; padding: 12px; }
  .label { font-size: 13px; color: #999; }
  h2 { width: 100%; font-size: 14px; color: #666; margin: 0; }
  .ref { display: flex; gap: 20px; align-items: center; }
  .ref-label { font-size: 11px; color: #555; }
</style>
</head>
<body>

<h2>Reference icons (Chat + Terminal) for style matching:</h2>
<div class="ref">
  <div class="option">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
      <path d="M4 5 L20 5 A2 2 0 0 1 22 7 L22 15 A2 2 0 0 1 20 17 L10 17 L6 20 L7 17 L4 17 A2 2 0 0 1 2 15 L2 7 A2 2 0 0 1 4 5 Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8.5 11 L8.5 11.01" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M12 11 L12 11.01" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M15.5 11 L15.5 11.01" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="ref-label">Chat</span>
  </div>
  <div class="option">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
      <path d="M4 4 L20 4 A2 2 0 0 1 22 6 L22 18 A2 2 0 0 1 20 20 L4 20 A2 2 0 0 1 2 18 L2 6 A2 2 0 0 1 4 4 Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 9 L10 12 L6 15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15 L17 15" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="ref-label">Terminal</span>
  </div>
</div>

<h2 style="margin-top: 20px;">Gamepad options:</h2>

<div class="option">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
    <!-- A: Classic — rounded rect body, d-pad + 2 buttons -->
    <rect x="2" y="6" width="20" height="12" rx="3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 10 L10 10" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M8.5 8.5 L8.5 11.5" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M15 9.5 L15 9.51" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M17 11 L17 11.01" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="label">A: Classic Rounded Rect</span>
</div>

<div class="option">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
    <!-- B: Ergonomic — curved grips like a real controller -->
    <path d="M8 6 L16 6 A2 2 0 0 1 18 8 L19 12 A4 4 0 0 1 18 16 L17 17 A2 2 0 0 1 15 18 L13 18 L12 16 L11 18 L9 18 A2 2 0 0 1 7 17 L6 16 A4 4 0 0 1 5 12 L6 8 A2 2 0 0 1 8 6 Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8.5 10 L10.5 10" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M9.5 9 L9.5 11" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M14.5 9.5 L14.5 9.51" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M16 11 L16 11.01" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="label">B: Ergonomic Grips</span>
</div>

<div class="option">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
    <!-- C: Minimal — pill body, just symbols -->
    <rect x="3" y="7" width="18" height="10" rx="5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7.5 10.5 L9.5 10.5" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M8.5 9.5 L8.5 11.5" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="15" cy="10" r="0.7" fill="#B0B0B0"/>
    <circle cx="16.5" cy="11.5" r="0.7" fill="#B0B0B0"/>
  </svg>
  <span class="label">C: Minimal Pill</span>
</div>

<div class="option">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
    <!-- D: Retro — SNES/NES style, flat top, rounded bottom -->
    <path d="M4 7 L20 7 A2 2 0 0 1 22 9 L22 15 A4 4 0 0 1 18 19 L6 19 A4 4 0 0 1 2 15 L2 9 A2 2 0 0 1 4 7 Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 11 L10 11" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M8.5 9.5 L8.5 12.5" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M15 10.5 L15 10.51" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M17 12 L17 12.01" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M14 12.5 L14 12.51" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="label">D: Retro Wide</span>
</div>

<div class="option">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#B0B0B0">
    <!-- E: Handheld — like a Game Boy, screen + buttons -->
    <rect x="5" y="3" width="14" height="18" rx="2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="7" y="5" width="10" height="7" rx="1" stroke-width="1.5"/>
    <path d="M9 15 L11 15" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M10 14 L10 16" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M14 14.5 L14 14.51" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M16 16 L16 16.01" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="label">E: Handheld</span>
</div>

</body>
</html>
