<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
  <!-- Triple CMY halftone dots — misregistered like a broken printing press -->
  <!-- Magenta plate -->
  <circle cx="5" cy="5" r="1.4" fill="#e8234a"/>
  <circle cx="20" cy="5" r="1.4" fill="#e8234a"/>
  <circle cx="5" cy="20" r="1.4" fill="#e8234a"/>
  <circle cx="20" cy="20" r="1.4" fill="#e8234a"/>
  <!-- Cyan plate — offset for misregistration -->
  <circle cx="12" cy="8" r="1.4" fill="#00b8ff"/>
  <circle cx="27" cy="8" r="1.4" fill="#00b8ff"/>
  <circle cx="12" cy="23" r="1.4" fill="#00b8ff"/>
  <circle cx="27" cy="23" r="1.4" fill="#00b8ff"/>
  <!-- Yellow plate — smaller, subtler -->
  <circle cx="8" cy="14" r="0.9" fill="#ffea00"/>
  <circle cx="23" cy="14" r="0.9" fill="#ffea00"/>
  <circle cx="8" cy="29" r="0.9" fill="#ffea00"/>
  <circle cx="23" cy="29" r="0.9" fill="#ffea00"/>
</svg>
